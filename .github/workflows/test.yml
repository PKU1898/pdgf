name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pdgf
          POSTGRES_PASSWORD: pdgf123
          POSTGRES_DB: pdgf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U pdgf"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://pdgf:pdgf123@localhost:5432/pdgf_test?schema=public
      DATABASE_URL_TEST: postgresql://pdgf:pdgf123@localhost:5432/pdgf_test?schema=public
      JWT_SECRET: test-jwt-secret-for-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install server dependencies
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: server
        run: pnpm db:generate

      - name: Run database migrations
        working-directory: server
        run: pnpm exec prisma migrate deploy

      - name: Run server tests
        working-directory: server
        run: pnpm test

      - name: Install miniapp dependencies
        working-directory: miniapp
        run: pnpm install --frozen-lockfile

      - name: Run miniapp tests
        working-directory: miniapp
        run: pnpm test
